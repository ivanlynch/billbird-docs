<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billbird</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="icon.png">
    <script>
        // Resolve the visitor's language and redirect to the matching version.
        // Order: stored preference -> browser language -> default (Spanish).
        (function () {
            var supported = { es: 'es/', en: 'en/', 'pt-br': 'pt-br/' };
            function pick(code) {
                if (!code) return null;
                code = code.toLowerCase();
                if (code.indexOf('pt') === 0) return 'pt-br';   // any Portuguese -> Brazilian
                if (code.indexOf('en') === 0) return 'en';
                if (code.indexOf('es') === 0) return 'es';
                return null;
            }
            var target = null;
            try {
                var stored = localStorage.getItem('billbird-lang');
                if (stored && supported[stored]) target = stored;
            } catch (e) {}
            if (!target) {
                var langs = navigator.languages || [navigator.language || navigator.userLanguage];
                for (var i = 0; i < langs.length; i++) {
                    var m = pick(langs[i]);
                    if (m) { target = m; break; }
                }
            }
            if (!target) target = 'es';
            location.replace(supported[target]);
        })();
    </script>
    <meta http-equiv="refresh" content="0; url=es/">
</head>
<body>
    <noscript>
        <p>Choose your language / Elige tu idioma / Escolha seu idioma:</p>
        <ul>
            <li><a href="es/">Español</a></li>
            <li><a href="en/">English</a></li>
            <li><a href="pt-br/">Português (BR)</a></li>
        </ul>
    </noscript>
</body>
</html>
