<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Billbird</title>
    <meta name="description" content="Need help with Billbird? Send us your question, suggestion or report and we'll get back to you shortly.">
    <link rel="icon" type="image/png" href="../icon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="canonical" href="https://ivanlynch.github.io/billbird-docs/en/support.html">
    <link rel="alternate" hreflang="es" href="https://ivanlynch.github.io/billbird-docs/es/support.html">
    <link rel="alternate" hreflang="en" href="https://ivanlynch.github.io/billbird-docs/en/support.html">
    <link rel="alternate" hreflang="pt-br" href="https://ivanlynch.github.io/billbird-docs/pt-br/support.html">
    <link rel="alternate" hreflang="x-default" href="https://ivanlynch.github.io/billbird-docs/es/support.html">
</head>
<body>

<!-- Top bar -->
<header class="topbar">
    <a class="topbar-home" href="index.html">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Billbird
    </a>
    <nav class="lang-switcher" aria-label="Language">
        <a href="../es/support.html" hreflang="es">Español</a>
        <span aria-current="page">English</span>
        <a href="../pt-br/support.html" hreflang="pt-br">Português&nbsp;(BR)</a>
    </nav>
</header>

<!-- Header -->
<div class="page-header">
    <div class="container container-narrow">
        <span class="section-tag">Support</span>
        <h1>How can we help you?</h1>
        <p>Send us your question and we'll reply shortly.</p>
    </div>
</div>

<!-- Form -->
<div class="container container-narrow">
    <div class="note">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>Clicking <strong>Send message</strong> will open your email client with the message ready to send.</p>
    </div>

    <div class="form-card">
        <form action="mailto:ilynchdev@gmail.com" method="post" enctype="text/plain">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="Name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="Email" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label for="type">Type of inquiry</label>
                <select id="type" name="Type">
                    <option value="Technical issue">Technical issue</option>
                    <option value="Suggestion">Suggestion</option>
                    <option value="General question">General question</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="Message" placeholder="Describe your inquiry in as much detail as possible..." required></textarea>
            </div>
            <button type="submit" class="submit-btn">
                <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                Send message
            </button>
        </form>
    </div>
</div>

<!-- Footer -->
<footer>
    <div class="container">
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms &amp; Conditions</a>
        </div>
        <p class="footer-copy">&copy; 2026 Billbird</p>
    </div>
</footer>

<script>try{localStorage.setItem('billbird-lang','en');}catch(e){}</script>
</body>
</html>
